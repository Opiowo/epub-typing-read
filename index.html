// ─── EPUB PARSER ─────────────────────────────────────────────────────────────
const parseEPUB = async file => {
  const zip = await JSZip.loadAsync(file);
  const containerXml = await zip.file('META-INF/container.xml').async('text');
  const containerDoc = new DOMParser().parseFromString(containerXml, 'text/xml');
  const contentPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  const contentDir = contentPath.substring(0, contentPath.lastIndexOf('/') + 1);
  const contentXml = await zip.file(contentPath).async('text');
  const contentDoc = new DOMParser().parseFromString(contentXml, 'text/xml');
  const spineItems = Array.from(contentDoc.querySelectorAll('spine itemref'));
  const manifest = {};
  contentDoc.querySelectorAll('manifest item').forEach(item => {
    manifest[item.getAttribute('id')] = item.getAttribute('href');
  });
  const ncxItem = Array.from(contentDoc.querySelectorAll('manifest item')).find(i => i.getAttribute('media-type') === 'application/x-dtbncx+xml');
  const navMap = {};
  if (ncxItem) {
    try {
      const ncxText = await zip.file(contentDir + ncxItem.getAttribute('href')).async('text');
      const ncxDoc = new DOMParser().parseFromString(ncxText, 'text/xml');
      ncxDoc.querySelectorAll('navPoint').forEach(np => {
        const src = np.querySelector('content')?.getAttribute('src')?.split('#')[0];
        const label = np.querySelector('navLabel text')?.textContent?.trim();
        if (src && label) navMap[src] = label;
      });
    } catch (e) {}
  }
  const chapters = [];
  for (const item of spineItems) {
    const href = manifest[item.getAttribute('idref')];
    if (href) {
      try {
        const html = await zip.file(contentDir + href).async('text');
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const hrefBase = href.split('/').pop();
        let title = navMap[href] || navMap[hrefBase] || doc.querySelector('title')?.textContent?.trim() || doc.querySelector('h1,h2,h3')?.textContent?.trim() || 'Section ' + (chapters.length + 1);
        const body = doc.querySelector('body');
        let text = '';
        if (body) {
          ['p', 'div', 'h1', 'h2', 'h3', 'li', 'blockquote'].forEach(tag => {
            for (let el of body.getElementsByTagName(tag)) el.innerHTML += '\n';
          });

        }
        if (text.length > 0) chapters.push({
          title,
          text
        });
      } catch (e) {
        console.error(e);
      }
    }
  }
  return chapters;
};

// ─── PDF PARAGRAPH RECONSTRUCTION ────────────────────────────────────────────
const reconstructParagraphs = items => {
  if (!items || items.length === 0) return '';

  const lines = [];
  let currentLine = null;
  for (const item of items) {
    const y = Math.round(item.transform[5]);
    const x = item.transform[4];
    const text = item.str;
    if (!text) continue;
    if (!currentLine || Math.abs(currentLine.y - y) > 2) {
      currentLine = {
        y,
        minX: x,
        items: []

    currentLine.items.push({
      x,
      text
    });

  }

  const gaps = [];

    const gap = lines[i - 1].y - lines[i].y;

  }

  const lineStrings = lines.map(line => {
    line.items.sort((a, b) => a.x - b.x);

  });

  const paragraphs = [];
  let current = '';
  for (let i = 0; i < lines.length; i++) {
    const lineText = lineStrings[i].trim();

      }

      current = lineText;
    }
  }
  if (current.trim()) paragraphs.push(current.trim());
  return paragraphs.join('\n\n');
};

const extractPDFOutline = async pdf => {

            pageIndex,
            depth

// ─── CHUNKER ─────────────────────────────────────────────────────────────────
const splitIntoChunks = (text, wordLimit) => {
  wordLimit = wordLimit || 100;
  const parts = text.split(/(\s+)/);
  const chunks = [];
  let current = '',
    count = 0;
  for (let part of parts) {
    current += part;
    if (/\S/.test(part)) count++;
    if (count >= wordLimit && part.includes('\n')) {
      chunks.push(current);
      current = '';
      count = 0;
    } else if (count >= wordLimit * 1.2) {
      chunks.push(current);
      current = '';
      count = 0;
    }
  }
  if (current.trim()) chunks.push(current);
  return chunks;
};
